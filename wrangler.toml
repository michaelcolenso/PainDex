name = "paindex"
main = "src/index.ts"
compatibility_date = "2026-07-02"
compatibility_flags = ["nodejs_compat"]

# Populate these after running the setup commands in README.md:
#   npx wrangler d1 create paindex
#   npx wrangler kv namespace create paindex-kv
#   npx wrangler vectorize create paindex-clusters --dimensions=768 --metric=cosine

[[d1_databases]]
binding = "DB"
database_name = "paindex"
database_id = "bc2fc4c8-3259-4654-9606-07a3354dc52b"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "KV"
id = "722af5a5c7014b7aaa010bee0a327611"

[[vectorize]]
binding = "VECTORIZE"
index_name = "paindex-clusters"

[ai]
binding = "AI"

# Six nightly ingest batches (15 min apart, starting 09:00 UTC) process 10
# subreddits each via a KV cursor; once the watchlist is exhausted the
# remaining triggers no-op for the night. The Sunday 12:00 UTC trigger runs
# the weekly Ahrefs enrichment + scoring pass.
[triggers]
crons = [
  "0 9 * * *",
  "15 9 * * *",
  "30 9 * * *",
  "45 9 * * *",
  "0 10 * * *",
  "15 10 * * *",
  "0 12 * * 0",
]

[observability]
enabled = true
